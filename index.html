<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小説の本棚</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--paper:#fff;--ink:#1a1510;--ink2:#4a4035;--ink3:#9a8e80;--border:#e0d5c8;--acc:#8b5e3c;--spine:#6b4423}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh}
header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);background:var(--paper);display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Noto Serif JP',serif;font-size:1.3rem;font-weight:500;color:var(--acc)}
.logo small{display:block;font-size:.65rem;color:var(--ink3);font-family:'Zen Kaku Gothic New',sans-serif;letter-spacing:.1em;margin-top:2px}
.hbtn{padding:.4rem 1rem;border:1px solid var(--acc);color:var(--acc);background:transparent;border-radius:2px;font-size:.75rem;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif}
.wrap{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}

/* 本 */
.stage{margin-bottom:1.5rem;width:100%;display:flex;justify-content:center}
.book{position:relative;width:540px;height:300px}
.spread{position:absolute;inset:0;display:flex;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.lp,.rp{width:50%;height:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem;overflow:hidden;background:var(--paper)}
.lp{border:1px solid var(--border);border-right:none;border-radius:4px 0 0 4px}
.rp{border:1px solid var(--border);border-left:none;border-radius:0 4px 4px 0;background:#fefcfa}
.spine{position:absolute;left:50%;top:0;width:4px;height:100%;background:linear-gradient(to right,#b8986a,var(--spine),#b8986a);transform:translateX(-50%);z-index:10}
.fp{position:absolute;top:0;right:0;width:50%;height:100%;z-index:15;display:none}
.fp-inner{position:absolute;inset:0;-webkit-transform-style:preserve-3d;transform-style:preserve-3d;-webkit-transform-origin:left center;transform-origin:left center}
.fp-f,.fp-b{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem;-webkit-backface-visibility:hidden;backface-visibility:hidden;overflow:hidden;background:var(--paper);border:1px solid var(--border)}
.fp-f{border-left:none;border-radius:0 4px 4px 0}
.fp-b{border-left:1px solid var(--border);border-right:none;border-radius:4px 0 0 4px;background:#fefcfa;-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.cover-img{width:90px;height:115px;object-fit:cover;border-radius:2px;border:1px solid var(--border);margin-bottom:.5rem;display:block}
.ttl{font-family:'Noto Serif JP',serif;font-size:.85rem;font-weight:700;text-align:center;line-height:1.5;max-width:140px}
.sum-ttl{font-family:'Noto Serif JP',serif;font-size:.8rem;font-weight:700;margin-bottom:.5rem;text-align:center}
.sum-txt{font-size:.7rem;color:var(--ink2);line-height:1.9;text-align:justify}
.pnum{font-size:.6rem;color:var(--ink3);position:absolute;bottom:8px}
.lp .pnum{left:10px}.rp .pnum{right:10px}
.plbl{font-size:.55rem;color:var(--ink3);letter-spacing:.1em;position:absolute;top:8px}
.lp .plbl{right:10px}.rp .plbl{left:10px}
.fp-f .pnum{right:10px}.fp-b .pnum{left:10px}
.fp-f .plbl{right:10px;top:8px}.fp-b .plbl{left:10px;top:8px}

/* コントロール */
.ctrls{display:flex;gap:.6rem;align-items:center;margin-bottom:1.25rem}
.nbtn{padding:.45rem 1.25rem;border:1px solid var(--border);background:var(--paper);border-radius:2px;font-size:.75rem;cursor:pointer;color:var(--ink2);font-family:'Zen Kaku Gothic New',sans-serif;transition:all .15s}
.nbtn:not(:disabled):hover{border-color:var(--acc);color:var(--acc)}
.nbtn:disabled{opacity:.3;cursor:default}
.ind{font-size:.75rem;color:var(--ink3);min-width:55px;text-align:center}

/* フォーム */
.fsec{width:100%;max-width:560px;background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:1.25rem}
.fsec-ttl{font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:500;color:var(--ink);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.wcard{border:1px solid var(--border);border-radius:2px;padding:.875rem;margin-bottom:.6rem}
.wcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.wlbl{font-size:.7rem;font-weight:500;color:var(--ink3)}
.wlbl.act{color:var(--acc)}
.acts{display:flex;gap:.3rem}
.sbtn{padding:.18rem .55rem;border:1px solid var(--border);border-radius:2px;background:transparent;font-size:.65rem;cursor:pointer;color:var(--ink3);font-family:'Zen Kaku Gothic New',sans-serif}
.rbtn{border:none;background:none;cursor:pointer;color:var(--ink3);font-size:.75rem;padding:.1rem .25rem}
.rbtn:hover{color:#c0392b}
.fld{margin-bottom:.55rem}
.fld label{font-size:.68rem;color:var(--ink3);display:block;margin-bottom:.2rem}
.fld input,.fld textarea{width:100%;padding:.4rem .55rem;border:1px solid var(--border);border-radius:2px;font-size:.8rem;background:var(--bg);color:var(--ink);resize:none;font-family:'Zen Kaku Gothic New',sans-serif}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--acc)}
.irow{display:flex;gap:.4rem;align-items:center}
.ithumb{width:26px;height:33px;object-fit:cover;border-radius:1px;border:1px solid var(--border);flex-shrink:0}
.ithumb-def{width:26px;height:33px;border-radius:1px;border:1px solid var(--border);background:var(--paper);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pckbtn{padding:.28rem .6rem;border:1px solid var(--border);border-radius:2px;font-size:.65rem;cursor:pointer;background:transparent;color:var(--ink3);font-family:'Zen Kaku Gothic New',sans-serif;white-space:nowrap}
.cc{font-size:.6rem;color:var(--ink3);float:right}
.addbtn{width:100%;padding:.55rem;border:1px dashed var(--border);border-radius:2px;background:transparent;color:var(--ink3);font-size:.75rem;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif;margin-top:.4rem}

@media(max-width:580px){
  .book{width:300px;height:175px}
  .cover-img{width:55px;height:70px}
  .lp,.rp,.fp-f,.fp-b{padding:.75rem}
  .ttl{font-size:.72rem}.sum-txt{font-size:.62rem}
  header{padding:1rem}
}
</style>
</head>
<body>
<header>
  <div class="logo">小説の本棚<small>NOVEL PORTFOLIO MAKER</small></div>
  <button class="hbtn" onclick="document.getElementById('fsec').scrollIntoView({behavior:'smooth'})">作品を編集</button>
</header>

<div class="wrap">
  <div class="stage">
    <div class="book">
      <div class="spread">
        <div class="lp">
          <div class="plbl">表紙</div>
          <div id="lpImg"></div>
          <div class="ttl" id="lpTtl">作品タイトル</div>
          <div class="pnum" id="lpNum">1</div>
        </div>
        <div class="spine"></div>
        <div class="rp">
          <div class="plbl">あらすじ</div>
          <div class="sum-ttl" id="rpTtl"></div>
          <div class="sum-txt" id="rpTxt">あらすじがここに表示されます。下のフォームから入力してください。</div>
          <div class="pnum" id="rpNum">2</div>
        </div>
      </div>
      <div class="fp" id="fp">
        <div class="fp-inner" id="fpInner">
          <div class="fp-f">
            <div class="plbl">表紙</div>
            <div id="fpFImg"></div>
            <div class="ttl" id="fpFTtl"></div>
            <div class="pnum" id="fpFNum"></div>
          </div>
          <div class="fp-b">
            <div class="plbl">あらすじ</div>
            <div class="sum-ttl" id="fpBTtl"></div>
            <div class="sum-txt" id="fpBTxt"></div>
            <div class="pnum" id="fpBNum"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="ctrls">
    <button class="nbtn" id="prevBtn" disabled>◀ 前</button>
    <span class="ind" id="ind">1 / 1</span>
    <button class="nbtn" id="nextBtn" disabled>次 ▶</button>
  </div>

  <div class="fsec" id="fsec">
    <div class="fsec-ttl">作品を編集</div>
    <div id="wlist"></div>
    <button class="addbtn" id="addBtn">＋ 作品を追加</button>
  </div>
</div>

<input type="file" id="filePicker" accept="image/*" style="display:none">

<script>
var W=[{title:'',summary:'',imgData:'',workUrl:''}];
var cur=0,busy=false,pickIdx=0;

// ナビ
document.getElementById('prevBtn').addEventListener('click',function(){flip(-1);});
document.getElementById('nextBtn').addEventListener('click',function(){flip(1);});
document.getElementById('addBtn').addEventListener('click',addWork);
document.getElementById('filePicker').addEventListener('change',onPick);

function addWork(){
  W.push({title:'',summary:'',imgData:'',workUrl:''});
  buildCards();
  updateNav();
}

function onPick(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    W[pickIdx].imgData=ev.target.result;
    var th=document.getElementById('th'+pickIdx);
    if(th){var img=document.createElement('img');img.className='ithumb';img.id='th'+pickIdx;img.src=ev.target.result;th.parentNode.replaceChild(img,th);}
    var cb=document.getElementById('cb'+pickIdx);if(cb)cb.style.display='';
    if(pickIdx===cur)refreshBook();
  };
  r.readAsDataURL(f);
}

function imgSrc(w){return w.imgData||'';}

function defSvg(){
  var s='<svg width="90" height="115" xmlns="http://www.w3.org/2000/svg"><rect width="90" height="115" fill="#faf8f5" stroke="#e0d5c8"/><rect x="5" y="5" width="80" height="105" fill="none" stroke="#e0d5c8" stroke-width="0.5"/><text x="45" y="62" dominant-baseline="middle" text-anchor="middle" font-size="14" fill="#8b5e3c" font-family="serif" writing-mode="vertical-rl" letter-spacing="5">小説</text></svg>';
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s);
}

function coverEl(w){
  var src=imgSrc(w)||defSvg();
  var img='<img class="cover-img" src="'+src+'" alt="">';
  return w.workUrl?'<a href="'+w.workUrl+'" target="_blank" rel="noopener" style="display:block">'+img+'</a>':img;
}

function refreshBook(){
  var w=W[cur];
  document.getElementById('lpImg').innerHTML=coverEl(w);
  document.getElementById('lpTtl').textContent=w.title||'作品タイトル';
  document.getElementById('lpNum').textContent=cur*2+1;
  document.getElementById('rpTtl').textContent=w.title||'';
  document.getElementById('rpTxt').textContent=w.summary||'あらすじがここに表示されます。下のフォームから入力してください。';
  document.getElementById('rpNum').textContent=cur*2+2;
}

function updateNav(){
  document.getElementById('ind').textContent=(cur+1)+' / '+W.length;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===W.length-1;
}

function flip(d){
  if(busy)return;
  var next=cur+d;if(next<0||next>=W.length)return;
  busy=true;
  var fp=document.getElementById('fp');
  var fi=document.getElementById('fpInner');
  var fw=d>0?W[cur]:W[next];
  var bw=d>0?W[next]:W[cur];
  var fn=d>0?cur*2+2:next*2+1;
  var bn=d>0?next*2+1:cur*2+2;
  document.getElementById('fpFImg').innerHTML=coverEl(fw);
  document.getElementById('fpFTtl').textContent=fw.title||'作品タイトル';
  document.getElementById('fpFNum').textContent=fn;
  document.getElementById('fpBTtl').textContent=bw.title||'';
  document.getElementById('fpBTxt').textContent=bw.summary||'あらすじがここに表示されます。';
  document.getElementById('fpBNum').textContent=bn;
  fp.style.display='block';
  fi.style.transition='none';
  fi.style.webkitTransition='none';
  var startRot=d>0?'rotateY(0deg)':'rotateY(-180deg)';
  var endRot=d>0?'rotateY(-180deg)':'rotateY(0deg)';
  fi.style.webkitTransform=startRot;fi.style.transform=startRot;
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    fi.style.transition='transform 0.6s cubic-bezier(.4,0,.2,1)';
    fi.style.webkitTransition='-webkit-transform 0.6s cubic-bezier(.4,0,.2,1)';
    fi.style.webkitTransform=endRot;fi.style.transform=endRot;
    setTimeout(function(){
      cur=next;refreshBook();updateNav();fp.style.display='none';busy=false;
    },640);
  });});
}

function buildCards(){
  // 既存カードを保持しながら増減に対応
  var list=document.getElementById('wlist');
  // 必要なカード数に合わせてDOMを調整
  while(list.children.length<W.length){
    var idx=list.children.length;
    list.appendChild(makeCard(idx));
  }
  while(list.children.length>W.length){
    list.removeChild(list.lastChild);
  }
  // 各カードの表示を更新
  for(var i=0;i<W.length;i++){
    updateCardDisplay(i);
  }
}

function makeCard(i){
  var div=document.createElement('div');
  div.className='wcard';div.id='card'+i;

  div.innerHTML='<div class="wcard-head"><span class="wlbl" id="wlbl'+i+'">作品 '+(i+1)+'</span><div class="acts"><button class="sbtn" id="jbtn'+i+'">表示</button><button class="rbtn" id="rmbtn'+i+'">✕</button></div></div>'
    +'<div class="fld"><label>作品名</label><input type="text" id="ti'+i+'" placeholder="タイトルを入力" maxlength="40"></div>'
    +'<div class="fld"><label>表紙画像</label><div class="irow"><div class="ithumb-def" id="th'+i+'"><span style="font-size:7px;color:var(--acc);writing-mode:vertical-rl">小説</span></div><button class="pckbtn" id="pb'+i+'">📁 選択</button><button class="rbtn" id="cb'+i+'" style="display:none">✕</button></div></div>'
    +'<div class="fld"><label>作品URL（なろう・カクヨムなど）</label><input type="text" id="ui'+i+'" placeholder="https://..."></div>'
    +'<div class="fld"><label>あらすじ <span class="cc" id="cc'+i+'">0/120字</span></label><textarea id="si'+i+'" rows="3" maxlength="120" placeholder="作品の魅力を120字以内で..."></textarea></div>';

  // イベント（クロージャでiを固定）
  (function(idx){
    div.querySelector('#jbtn'+idx).addEventListener('click',function(){cur=idx;refreshBook();updateNav();updateAllLabels();});
    div.querySelector('#rmbtn'+idx).addEventListener('click',function(){
      if(W.length===1)return;
      W.splice(idx,1);if(cur>=W.length)cur=W.length-1;
      rebuildAll();
    });
    div.querySelector('#pb'+idx).addEventListener('click',function(){pickIdx=idx;document.getElementById('filePicker').value='';document.getElementById('filePicker').click();});
    div.querySelector('#cb'+idx).addEventListener('click',function(){
      W[idx].imgData='';
      var th=document.getElementById('th'+idx);
      if(th){var def=document.createElement('div');def.className='ithumb-def';def.id='th'+idx;def.innerHTML='<span style="font-size:7px;color:var(--acc);writing-mode:vertical-rl">小説</span>';th.parentNode.replaceChild(def,th);}
      this.style.display='none';
      if(idx===cur)refreshBook();
    });
    div.querySelector('#ti'+idx).addEventListener('input',function(){
      W[idx].title=this.value;
      if(idx===cur){document.getElementById('lpTtl').textContent=this.value||'作品タイトル';document.getElementById('rpTtl').textContent=this.value||'';}
      var lbl=document.getElementById('wlbl'+idx);
      if(lbl)lbl.textContent='作品 '+(idx+1)+(idx===cur?' ◆':'')+' '+(this.value?'「'+this.value+'」':'');
    });
    div.querySelector('#ui'+idx).addEventListener('input',function(){W[idx].workUrl=this.value;if(idx===cur)refreshBook();});
    div.querySelector('#si'+idx).addEventListener('input',function(){
      W[idx].summary=this.value;
      if(idx===cur)document.getElementById('rpTxt').textContent=this.value||'あらすじがここに表示されます。下のフォームから入力してください。';
      var cc=document.getElementById('cc'+idx);if(cc)cc.textContent=this.value.length+'/120字';
    });
  })(i);

  return div;
}

function updateCardDisplay(i){
  var w=W[i];var active=i===cur;
  var lbl=document.getElementById('wlbl'+i);
  if(lbl){lbl.textContent='作品 '+(i+1)+(active?' ◆':'')+' '+(w.title?'「'+w.title+'」':'');lbl.className='wlbl'+(active?' act':'');}
  var ti=document.getElementById('ti'+i);if(ti&&ti!==document.activeElement)ti.value=w.title||'';
  var ui=document.getElementById('ui'+i);if(ui&&ui!==document.activeElement)ui.value=w.workUrl||'';
  var si=document.getElementById('si'+i);if(si&&si!==document.activeElement)si.value=w.summary||'';
  var cc=document.getElementById('cc'+i);if(cc)cc.textContent=(w.summary||'').length+'/120字';
  var jbtn=document.getElementById('jbtn'+i);if(jbtn)jbtn.style.display=active?'none':'';
  if(w.imgData){
    var th=document.getElementById('th'+i);
    if(th&&th.tagName!=='IMG'){var img=document.createElement('img');img.className='ithumb';img.id='th'+i;img.src=w.imgData;th.parentNode.replaceChild(img,th);}
    var cb=document.getElementById('cb'+i);if(cb)cb.style.display='';
  }
}

function updateAllLabels(){
  for(var i=0;i<W.length;i++){
    var lbl=document.getElementById('wlbl'+i);
    if(lbl){var w=W[i];lbl.textContent='作品 '+(i+1)+(i===cur?' ◆':'')+' '+(w.title?'「'+w.title+'」':'');lbl.className='wlbl'+(i===cur?' act':'');}
    var jbtn=document.getElementById('jbtn'+i);if(jbtn)jbtn.style.display=i===cur?'none':'';
  }
}

function rebuildAll(){
  document.getElementById('wlist').innerHTML='';
  for(var i=0;i<W.length;i++){document.getElementById('wlist').appendChild(makeCard(i));}
  for(var j=0;j<W.length;j++){updateCardDisplay(j);}
  refreshBook();updateNav();
}

// 初期化
rebuildAll();
refreshBook();
updateNav();
</script>
</body>
</html>
